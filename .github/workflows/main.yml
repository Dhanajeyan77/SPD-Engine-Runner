name: SPD Universal Security Engine

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'The SPD User who owns this target'
        required: true
      target_url:
        description: 'The specific URL to be audited'
        required: true

jobs:
  dynamic_audit:
    runs-on: ubuntu-latest
    steps:
      - name: 🛡️ Deploying Stealth Engine
        run: |
          USER_NAME="${{ github.event.inputs.username }}"
          TARGET="${{ github.event.inputs.target_url }}"
          
          echo "Initiating Audit for $USER_NAME on $TARGET"
          
          # Fetch the smart bimodal engine and pass BOTH arguments
          curl -s https://spd-1j53.onrender.com/static/engine.sh | bash -s -- "$USER_NAME" "$TARGET"
