#!/bin/bash
# SPD Stealth Engine - URL MODE

USER_ID=$1
TARGET_URL=$2
REPO_NAME=$(basename "$GITHUB_REPOSITORY")

echo "🌐 SPD Engine: Live SaaS Perimeter Scan on $TARGET_URL"

# 1. Cloud DAST
docker run --rm -v $(pwd):/zap/wrk/:rw --network=host ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t $TARGET_URL -r zap_report.html || true

sudo chown -R $USER:$USER .

# 2. Host ZAP on GitHub Pages & Send URL to DB
UNIQUE_REPORT_NAME="URL_SCAN_${USER_ID}_zap.html"
cp zap_report.html $UNIQUE_REPORT_NAME

git config --global user.name "SPD Orchestrator"
git config --global user.email "bot@spd.com"
git fetch origin gh-pages || true
git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
git add $UNIQUE_REPORT_NAME
git commit -m "Auto-deploy URL ZAP report"
git push origin gh-pages

OWNER=$(echo $GITHUB_REPOSITORY | cut -d'/' -f1)
PAGES_URL="https://${OWNER}.github.io/${REPO_NAME}/${UNIQUE_REPORT_NAME}"

curl -X POST -F "report_url=${PAGES_URL}" -F "filename=${UNIQUE_REPORT_NAME}" -F "username=${USER_ID}" https://spd-1j53.onrender.com/upload-report
echo "✅ URL Audit Complete."
